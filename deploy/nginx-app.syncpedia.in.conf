# Syncpedia app — https://app.syncpedia.in only
# Install: sudo cp deploy/nginx-app.syncpedia.in.conf /etc/nginx/sites-available/app.syncpedia.in
#          sudo ln -s /etc/nginx/sites-available/app.syncpedia.in /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name app.syncpedia.in;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# After certbot:
# sudo certbot --nginx -d app.syncpedia.in
