<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark light" />
    <title>Syncpedia</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #0f1f1c;
        color: #f5f5f5;
      }
      .loader {
        text-align: center;
      }
      .mark {
        width: 72px;
        height: 72px;
        margin: 0 auto 16px;
        border-radius: 18px;
        background: #1a3a34;
        display: grid;
        place-items: center;
        font-size: 36px;
        font-weight: 700;
      }
      p {
        margin: 0;
        opacity: 0.8;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="loader">
      <div class="mark" aria-hidden="true">S</div>
      <p>Loading Syncpedia…</p>
    </div>
    <script>
      location.replace("https://app.syncpedia.in");
    </script>
  </body>
</html>
